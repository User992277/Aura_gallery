<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - AURA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-sans relative overflow-hidden">
    
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-white/5 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="glass-card p-10 rounded-3xl w-full max-w-md relative z-10 shadow-2xl">
        <div class="text-center mb-8">
            <a href="{{ url_for('home') }}" class="text-3xl font-bold tracking-widest text-white mb-2 block">AURA</a>
            <p class="text-gray-400 text-sm tracking-wide">Welcome back. Please enter your details.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-6 p-3 rounded-lg text-sm text-center bg-red-500/10 border border-red-500/20 text-red-400">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
                <input type="email" name="email" required 
                       class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-white/30 focus:ring-1 focus:ring-white/30 transition-all duration-300">
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Password</label>
                <input type="password" name="password" required 
                       class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-white/30 focus:ring-1 focus:ring-white/30 transition-all duration-300">
            </div>

            <button type="submit" 
                    class="w-full bg-white text-black font-bold py-3.5 rounded-xl hover:bg-gray-200 transition-all duration-300 transform hover:-translate-y-1 shadow-[0_0_20px_rgba(255,255,255,0.15)]">
                Sign In
            </button>
        </form>

        <p class="text-center text-gray-500 text-sm mt-8">
            Don't have an account? 
            <a href="{{ url_for('register') }}" class="text-white font-semibold hover:underline transition-all">Create one</a>
        </p>
    </div>
</body>
</html>
